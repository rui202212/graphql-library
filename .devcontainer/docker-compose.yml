services:
  app:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
      shadowdb-init:
        condition: service_completed_successfully
    env_file:
      - .env
    ports:
      - "4003:4003"

  db:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: library
      MARIADB_USER: app
      MARIADB_PASSWORD: app
    ports:
      - "3307:3306"
    healthcheck:
      # Utilise le client "mariadb-admin" disponible dans l'image
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    volumes:
      - db-data:/var/lib/mysql

  # Service one-shot qui crée la base shadow si elle n'existe pas
  shadowdb-init:
    image: mariadb:11.4
    depends_on:
      db:
        condition: service_healthy
    entrypoint: [ "bash", "-lc" ]
    command:
      - |
        mariadb -h db -uroot -proot -e "CREATE DATABASE IF NOT EXISTS library_shadow;"
    restart: "no"

volumes:
  db-data: